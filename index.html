<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dynamic Face + Hand Mesh Mapper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Segoe UI', Arial, sans-serif; color: white; }
#app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; transform: scaleX(-1); }
#status { position: absolute; top: 15px; left: 15px; z-index: 100; padding: 12px 18px; background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; font-size: 14px; font-weight: bold; backdrop-filter: blur(10px); letter-spacing: 0.5px; }
#legend { position: absolute; bottom: 15px; left: 15px; z-index: 100; padding: 15px; background: rgba(0, 0, 0, 0.7); border-radius: 8px; font-size: 11px; line-height: 1.5; max-width: 280px; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
.highlight { color: #00ff88; font-weight: bold; }
.accent { color: #ff3366; font-weight: bold; }
.hand-accent { color: #ffcc00; font-weight: bold; }
</style>
</head>
<body>

<div id="app">
    <div id="status">INITIALIZING DETECTION ENGINE...</div>
    <div id="legend">
        <span class="highlight">█ Face Mesh:</span> 468-point tracking (Brows, Eyes, Cheeks, Nose, Lips, Jaw/Chin)<br>
        <span class="accent">█ Feature Pins:</span> Dedicated sub-component tracking anchors<br>
        <span class="hand-accent">█ Hand Skeleton:</span> 21-point structural alignment per hand
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;

// Exact localized landmark map IDs for precise real-time pinning
const DETAILED_FACE_LABELS = {
    "Hairline Core": 10,
    "Left Brow Outer": 70,
    "Right Brow Outer": 300,
    "Left Eye Center": 159,
    "Right Eye Center": 386,
    "Left Cheek Bone": 234,
    "Right Cheek Bone": 454,
    "Nose Bridge": 6,
    "Nose Tip": 1,
    "Upper Lip Margin": 13,
    "Lower Lip Margin": 14,
    "Mouth Corner Left": 61,
    "Mouth Corner Right": 291,
    "Chin Base": 152
};

const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],       // Thumb
    [0,5], [5,6], [6,7], [7,8],       // Index
    [9,10], [10,11], [11,12],         // Middle
    [13,14], [14,15], [15,16],        // Ring
    [0,17], [17,18], [18,19], [19,20], // Pinky
    [5,9], [9,13], [13,17]             // Palm base bonds
];

const HAND_LABELS = { 0: "Wrist", 4: "Thumb", 8: "Index", 12: "Middle", 16: "Ring", 20: "Pinky" };

async function initTracking() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task" },
            runningMode: "VIDEO",
            numHands: 2
        });

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            status.textContent = "SYSTEM ACTIVE - LOCK ACQUIRED";
            requestAnimationFrame(predictLoop);
        };
    } catch (err) {
        status.textContent = "CRITICAL INITIALIZATION ERROR";
        console.error(err);
    }
}

function drawPoint(x, y, radius, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
}

function drawLabel(text, x, y, textColor = "#ffffff", bgColor = "rgba(0, 0, 0, 0.8)") {
    ctx.font = "bold 10px monospace";
    const width = ctx.measureText(text).width;
    const paddingX = 6;
    const paddingHeight = 14;

    ctx.fillStyle = bgColor;
    ctx.fillRect(x - paddingX, y - 12, width + (paddingX * 2), paddingHeight);
    
    // Reverse text mirroring transformation accurately context-wide
    ctx.save();
    ctx.translate(x, y - 1);
    ctx.scale(-1, 1);
    ctx.fillStyle = textColor;
    ctx.fillText(text, -width, 0);
    ctx.restore();
}

async function predictLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);
        
        const w = canvas.width;
        const h = canvas.height;

        // --- FACE PROCESSING ENGINE ---
        let faceDetected = false;
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            faceDetected = true;
            const facePoints = faceResult.faceLandmarks[0];

            // Render all 468 mesh elements seamlessly
            facePoints.forEach(pt => {
                drawPoint(pt.x * w, pt.y * h, 0.8, "rgba(0, 255, 136, 0.45)");
            });

            // Calculate adaptive positional labeling directly on target indices
            for (const [name, index] of Object.entries(DETAILED_FACE_LABELS)) {
                const pt = facePoints[index];
                if (pt) {
                    const cx = pt.x * w;
                    const cy = pt.y * h;
                    drawPoint(cx, cy, 3.5, "#ff3366");
                    drawLabel(name, cx + 8, cy, "#ffffff", "rgba(255, 51, 102, 0.85)");
                }
            }
        }

        // --- HAND PROCESSING ENGINE ---
        let handCount = 0;
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handCount = handResult.landmarks.length;

            handResult.landmarks.forEach((hand) => {
                // Render skeletal connection bonds
                ctx.strokeStyle = "rgba(255, 204, 0, 0.75)";
                ctx.lineWidth = 2;
                HAND_CONNECTIONS.forEach(([src, dest]) => {
                    const p1 = hand[src];
                    const p2 = hand[dest];
                    if (p1 && p2) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x * w, p1.y * h);
                        ctx.lineTo(p2.x * w, p2.y * h);
                        ctx.stroke();
                    }
                });

                // Render structural joints & contextual tags
                hand.forEach((joint, idx) => {
                    const jx = joint.x * w;
                    const jy = joint.y * h;
                    drawPoint(jx, jy, 4, "#ffcc00");

                    if (HAND_LABELS[idx] !== undefined) {
                        drawLabel(HAND_LABELS[idx], jx + 8, jy, "#000000", "rgba(255, 204, 0, 0.9)");
                    }
                });
            });
        }

        // Update UI Diagnostics
        if (faceDetected || handCount > 0) {
            status.innerHTML = `TRACKING Active ${faceDetected ? '[FACE]' : ''} ${handCount > 0 ? `[HANDS: ${handCount}]` : ''}`;
        } else {
            status.innerHTML = "SCANNING ENVIRONMENT...";
        }
    }

    requestAnimationFrame(predictLoop);
}

initTracking();
</script>
</body>
</html>
