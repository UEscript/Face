<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Local 3D Matrix Mesh</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #020204; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(5, 5, 10, 0.85);
            border: 1px solid rgba(0, 245, 212, 0.3); border-radius: 8px;
            font-size: 11px; color: #00f5d4; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: LOCAL GEOMETRIC MATRIX</div>
        <div id="fps">FPS: -- [GPU DIRECT]</div>
        <div id="status">STATUS: STARTING CAM...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const statusDisplay = document.getElementById("status");

let frameCount = 0;
let lastFpsUpdate = performance.now();
window.latestHandResults = null;

// High-tech skeletal blueprints mapped out directly for mobile compatibility
const FACE_CONTOURS = [
    [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 10], // Face Outer Edge
    [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246, 33], // Left Eye Loop
    [362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398, 362], // Right Eye Loop
    [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40, 185, 61], // Lips Outer Perimeter
    [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308, 418, 312, 311, 310, 13, 80, 81, 82, 96, 78],  // Lips Inner Perimeter
    [70, 63, 105, 66, 107, 55, 65, 52, 53, 46], // Left Eyebrow
    [336, 296, 334, 293, 300, 276, 283, 282, 295, 285], // Right Eyebrow
    [168, 6, 197, 195, 5, 4, 1, 19, 94, 2] // Nose Ridge Path
];

const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],           
    [0,5], [5,6], [6,7], [7,8],           
    [9,10], [10,11], [11,12],             
    [13,14], [14,15], [15,16],            
    [0,17], [17,18], [18,19], [19,20],    
    [5,9], [9,13], [13,17]
];

// Instantly request the device camera
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeTracking();
}).catch(err => {
    statusDisplay.textContent = "STATUS: CAMERA DENIED";
    console.error(err);
});

function initializeTracking() {
    statusDisplay.textContent = "STATUS: INJECTING ENGINE...";

    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    faceMesh.onResults((results) => {
        statusDisplay.textContent = "STATUS: TRACKING ACTIVE";
        renderMatrixFrame(results);
    });
    
    hands.onResults((results) => {
        window.latestHandResults = results;
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
            await hands.send({ image: video });
        }
    });
    
    camera.start();
}

function renderMatrixFrame(faceResults) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);

    // --- FACE MESH ENGINE ---
    if (faceResults.multiFaceLandmarks && faceResults.multiFaceLandmarks.length > 0) {
        const landmarks = faceResults.multiFaceLandmarks[0];

        // 1. Plot all face matrix nodes as clean tracking micro-dots
        ctx.fillStyle = "rgba(0, 245, 212, 0.7)";
        for (let i = 0; i < landmarks.length; i++) {
            const pt = landmarks[i];
            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.5, 0, 2 * Math.PI);
            ctx.fill();
        }

        // 2. Connect structural tracking paths smoothly
        FACE_CONTOURS.forEach((path, pathIdx) => {
            // Path indices 1, 2, 3, 4 represent eyes and lips -> Style them Hot Pink
            if (pathIdx >= 1 && pathIdx <= 4) {
                ctx.strokeStyle = "#ff007f";
                ctx.lineWidth = 2.0;
            } else {
                // Outer bounds, nose, and brows -> Style them Neon Cyan
                ctx.strokeStyle = "#00f5d4";
                ctx.lineWidth = 1.5;
            }

            ctx.beginPath();
            path.forEach((idx, step) => {
                const pt = landmarks[idx];
                if (pt) {
                    if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                    else ctx.lineTo(pt.x * w, pt.y * h);
                }
            });
            ctx.stroke();
        });
    }

    // --- HAND RIG ENGINE ---
    const activeHands = window.latestHandResults;
    if (activeHands && activeHands.multiHandLandmarks) {
        activeHands.multiHandLandmarks.forEach(handLandmarks => {
            
            // 1. Draw hand skeletal bone lines
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            for (const connection of HAND_CONNECTIONS) {
                const from = handLandmarks[connection[0]];
                const to = handLandmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();

            // 2. Overlay golden structural node dots
            ctx.fillStyle = "#ffcc00";
            for (const pt of handLandmarks) {
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
        });
    }

    ctx.restore();

    // Hardware Telemetry Engine
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU DIRECT]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
