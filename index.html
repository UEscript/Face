<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ultimate Dense Mesh Wireframe Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #040406; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 12px 16px; 
            background: rgba(4, 4, 6, 0.9); 
            border: 1px solid rgba(0, 255, 150, 0.3); 
            border-radius: 8px; 
            font-size: 12px; 
            color: #00ff96;
            backdrop-filter: blur(10px); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-family: monospace;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: DENSE GEOMETRIC GRAPH ENGINE</div>
        <div id="fps">FPS: --</div>
        <div id="status">STATUS: INITIALIZING CAM FEED...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
// We pull the complete vision library suite directly via CDN
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const statusDisplay = document.getElementById("status");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();

// MediaPipe's official internal face mesh triangulation indices.
// This encodes the exact interconnecting triangular lines across all 468 points.
let faceTriangles = [];

// Full skeleton structural maps for hands (joints + outer fingertips + side perimeter connections)
const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],           // Thumb
    [0,5], [5,6], [6,7], [7,8],           // Index
    [9,10], [10,11], [11,12],             // Middle
    [13,14], [14,15], [15,16],            // Ring
    [0,17], [17,18], [18,19], [19,20],    // Pinky
    [5,9], [9,13], [13,17],                // Knuckle Base Lines
    [0,5], [0,17]                         // Wrist Base Borders
];

// Hand perimeter contour edge indices to outline the hand shape perfectly
const HAND_EDGES = [0, 1, 2, 3, 4, 3, 2, 1, 5, 6, 7, 8, 7, 6, 9, 10, 11, 12, 11, 10, 13, 14, 15, 16, 15, 14, 17, 18, 19, 20, 19, 18, 17, 0];

async function initializeSystem() {
    try {
        statusDisplay.textContent = "STATUS: DOWNLOADING TARGET MODELS...";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        // Generate the 468-point face mesh triangulation array dynamically
        faceTriangles = FaceLandmarker.getTrianglesByCpu();

        statusDisplay.textContent = "STATUS: RECOVERING HARDWARE FEED...";
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            statusDisplay.textContent = "STATUS: LOCK ACQUIRED";
            requestAnimationFrame(processingRenderLoop);
        };
    } catch (err) {
        statusDisplay.textContent = "STATUS: CAM FAULT";
        console.error(err);
    }
}

function processingRenderLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Mirror canvas alignment instantly to fix tracking offsets
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);

        const w = canvas.width;
        const h = canvas.height;

        // --- DENSE TRIANGULATION FACE MESH ---
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];

            // Renders the dense multi-directional mesh matrix over the entire face surface
            ctx.strokeStyle = "rgba(0, 255, 180, 0.22)"; // Cyberpunk green grid
            ctx.lineWidth = 0.8;
            
            ctx.beginPath();
            // Loop through all geometric triplets to build the continuous grid wireframe
            for (let i = 0; i < faceTriangles.length; i += 3) {
                const ptA = face[faceTriangles[i]];
                const ptB = face[faceTriangles[i + 1]];
                const ptC = face[faceTriangles[i + 2]];

                if (ptA && ptB && ptC) {
                    ctx.moveTo(ptA.x * w, ptA.y * h);
                    ctx.lineTo(ptB.x * w, ptB.y * h);
                    ctx.lineTo(ptC.x * w, ptC.y * h);
                    ctx.lineTo(ptA.x * w, ptA.y * h);
                }
            }
            ctx.stroke();

            // Bold highlights for key active profiles (Eyes, Brows, Lips, Outer Rim)
            ctx.strokeStyle = "rgba(255, 51, 102, 0.75)"; // Bright contrast pink
            ctx.lineWidth = 1.8;
            
            // Loop contours: Lips & Eyes
            const features = [
                [33, 160, 158, 133, 153, 144, 33], // Left Eye Rim
                [362, 385, 387, 263, 373, 380, 362], // Right Eye Rim
                [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61] // Lips Outer Perimeter
            ];

            features.forEach(path => {
                ctx.beginPath();
                path.forEach((idx, step) => {
                    const pt = face[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });

            // Draw neck base tracking anchor directly off the lower chin coordinates
            ctx.strokeStyle = "rgba(0, 162, 255, 0.6)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(face[152].x * w, face[152].y * h); // Chin base
            ctx.lineTo(face[152].x * w, (face[152].y + 0.12) * h); // Core neck vector dropping straight down safely
            ctx.stroke();
        }

        // --- FULL BOUNDARY HAND & FINGER TRACKER ---
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                // 1. Draw structural bone connections
                ctx.strokeStyle = "#ffcc00"; // Deep tech yellow
                ctx.lineWidth = 2.2;
                ctx.beginPath();
                HAND_CONNECTIONS.forEach(([start, end]) => {
                    const p1 = hand[start];
                    const p2 = hand[end];
                    if (p1 && p2) {
                        ctx.moveTo(p1.x * w, p1.y * h);
                        ctx.lineTo(p2.x * w, p2.y * h);
                    }
                });
                ctx.stroke();

                // 2. Draw outer hand edge outline (fixes your missing fingers issue)
                ctx.strokeStyle = "rgba(255, 204, 0, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                HAND_EDGES.forEach((idx, step) => {
                    const pt = hand[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });
        }

        ctx.restore();
    }

    // High performance calculation loop indicator
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU NATIVE]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(processingRenderLoop);
}

initializeSystem();
</script>
</body>
</html>
