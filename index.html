<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Instant 3D Face Matrix Rig</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffff; border-radius: 8px;
            font-size: 11px; color: #00ffff; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: PURE 3D FACE LOCK RIG</div>
        <div id="fps">FPS: -- [MAX COMPUTE]</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");

let frameCount = 0;
let lastFpsUpdate = performance.now();

// Instantly open the camera feed
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeFaceLock();
});

function initializeFaceLock() {
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, // Perfect precision tracking for eyes/lips
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    faceMesh.onResults((results) => {
        render3DMatrix(results);
    });

    // Send camera frames directly into the specialized face pipeline
    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
        }
    });
    camera.start();
}

function render3DMatrix(results) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // 1. Draw the absolute structural 3D mesh lines (Connect the dots seamlessly)
        ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
        ctx.lineWidth = 1.0;
        ctx.beginPath();
        for (const connection of FACEMESH_TESSELATION) {
            const from = landmarks[connection[0]];
            const to = landmarks[connection[1]];
            if (from && to) {
                ctx.moveTo(from.x * w, from.y * h);
                ctx.lineTo(to.x * w, to.y * h);
            }
        }
        ctx.stroke();

        // 2. High-Contrast Highlight Paths (Eyes, Eyebrows, Lips outer rings)
        const featurePaths = [
            { path: FACEMESH_RIGHT_EYE, color: "#ff0055", width: 2.2 },
            { path: FACEMESH_LEFT_EYE, color: "#ff0055", width: 2.2 },
            { path: FACEMESH_LIPS, color: "#ff0055", width: 2.2 },
            { path: FACEMESH_RIGHT_EYEBROW, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LEFT_EYEBROW, color: "#00ffff", width: 1.8 }
        ];

        featurePaths.forEach(feature => {
            ctx.strokeStyle = feature.color;
            ctx.lineWidth = feature.width;
            ctx.beginPath();
            for (const connection of feature.path) {
                const from = landmarks[connection[0]];
                const to = landmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();
        });

        // 3. Render tracking nodes directly on top of every intersection across the 3D space
        ctx.fillStyle = "#33ffff";
        for (let i = 0; i < landmarks.length; i++) {
            const pt = landmarks[i];
            
            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.8, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    ctx.restore();

    // FPS Counter Performance Check
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))} [MAX COMPUTE]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
