<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Face Feature Mapper</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
}

video,canvas{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

#status{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.6);
    padding:8px;
    border-radius:8px;
    z-index:100;
}
</style>
</head>
<body>

<div id="container">
    <div id="status">Loading...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">

import {
    FaceLandmarker,
    FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusBox = document.getElementById("status");

let faceLandmarker;

const LABELS = {
    "Forehead": 10,
    "Hairline": 10,
    "Left Eye": 33,
    "Right Eye": 263,
    "Left Eyebrow": 70,
    "Right Eyebrow": 300,
    "Nose Bridge": 6,
    "Nose Tip": 1,
    "Upper Lip": 13,
    "Lower Lip": 14,
    "Left Cheek": 234,
    "Right Cheek": 454,
    "Jawline": 172,
    "Chin": 152
};

async function setupCamera() {

    const stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:"user",
            width:{ideal:1280},
            height:{ideal:720}
        }
    });

    video.srcObject = stream;

    return new Promise(resolve=>{
        video.onloadedmetadata=()=>{
            resolve();
        };
    });
}

async function loadModel() {

    const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    faceLandmarker = await FaceLandmarker.createFromOptions(
        vision,
        {
            baseOptions:{
                modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
            },
            runningMode:"VIDEO",
            numFaces:1,
            outputFaceBlendshapes:false
        }
    );
}

function drawLabel(text,x,y){

    ctx.font="12px Arial";

    const width = ctx.measureText(text).width;

    ctx.fillStyle="rgba(0,0,0,.7)";
    ctx.fillRect(x-4,y-14,width+8,18);

    ctx.fillStyle="white";
    ctx.fillText(text,x,y);
}

function drawLandmarks(landmarks){

    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle="#00ff66";

    for(const point of landmarks){

        const x = point.x * w;
        const y = point.y * h;

        ctx.beginPath();
        ctx.arc(x,y,1.5,0,Math.PI*2);
        ctx.fill();
    }

    Object.entries(LABELS).forEach(([name,index])=>{

        const p = landmarks[index];

        if(!p) return;

        const x = p.x * w;
        const y = p.y * h;

        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(x,y,4,0,Math.PI*2);
        ctx.fill();

        drawLabel(name,x+8,y-8);
    });
}

let lastVideoTime = -1;

function render(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const now = performance.now();

    if(video.currentTime !== lastVideoTime){

        lastVideoTime = video.currentTime;

        const result = faceLandmarker.detectForVideo(
            video,
            now
        );

        if(result.faceLandmarks.length > 0){

            drawLandmarks(
                result.faceLandmarks[0]
            );

            statusBox.innerText =
                "Face detected • 468 landmarks";
        }
        else{
            statusBox.innerText =
                "Looking for a face...";
        }
    }

    requestAnimationFrame(render);
}

async function start(){

    try{

        statusBox.innerText="Loading model...";

        await loadModel();

        statusBox.innerText="Opening camera...";

        await setupCamera();

        statusBox.innerText="Ready";

        render();

    }catch(err){

        console.error(err);

        statusBox.innerText =
            "Camera/model error";
    }
}

start();

</script>

</body>
</html>
