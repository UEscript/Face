<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>All-Angle Responsive Matrix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffff; border-radius: 8px;
            font-size: 11px; color: #00ffff; font-family: monospace;
            line-height: 1.5; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
        .lock-tag { color: #ff0055; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: ALL-ANGLE GEOMETRY ENGINE</div>
        <div id="fps">FPS: --</div>
        <hr style="border: 0; border-top: 1px solid rgba(0,255,255,0.2); margin: 8px 0;">
        <div id="track-dir">FACING: DETECTING...</div>
        <div id="features-list">
            CHIN: <span class="lock-tag">WAITING</span><br>
            EYEBROWS: <span class="lock-tag">WAITING</span><br>
            EYES: <span class="lock-tag">WAITING</span><br>
            LIPS: <span class="lock-tag">WAITING</span>
        </div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const trackDirDisplay = document.getElementById("track-dir");
const featuresDisplay = document.getElementById("features-list");

let frameCount = 0;
let lastFpsUpdate = performance.now();

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeAllAngleEngine();
});

function initializeAllAngleEngine() {
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, 
        minDetectionConfidence: 0.4,
        minTrackingConfidence: 0.4
    });

    faceMesh.onResults((results) => {
        renderAllAngleMatrix(results);
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
        }
    });
    camera.start();
}

function renderAllAngleMatrix(results) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // --- ASPECT RATIO POSITION DETECTION ---
        // Dynamically tracks orientation based on horizontal surface span ratios
        const leftEdge = landmarks[234].x;
        const rightEdge = landmarks[454].x;
        const noseCenter = landmarks[1].x;

        const leftDist = Math.abs(noseCenter - leftEdge);
        const rightDist = Math.abs(rightEdge - noseCenter);
        const ratio = leftDist / rightDist;

        let trackingDirection = "CENTER VIEW";
        if (ratio < 0.45) {
            trackingDirection = "PROFILE VIEW (RIGHT SIDE)";
        } else if (ratio > 2.2) {
            trackingDirection = "PROFILE VIEW (LEFT SIDE)";
        }
        trackDirDisplay.textContent = `FACING: ${trackingDirection}`;

        // Update target feature tracking locks in telemetry
        featuresDisplay.innerHTML = `
            CHIN: <span style="color:#00ffff">LOCKED (NODE 152)</span><br>
            EYEBROWS: <span style="color:#00ffff">LOCKED (MULTI-SEGMENT)</span><br>
            EYES: <span style="color:#00ffff">LOCKED (IRIS REFINE)</span><br>
            LIPS: <span style="color:#00ffff">LOCKED (STRETCH RIG)</span>
        `;

        // --- FULL 3D CONNECTIVITY LINES (NO HARD PASS CUTOFFS) ---
        ctx.strokeStyle = "rgba(0, 255, 255, 0.18)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        for (const connection of FACEMESH_TESSELATION) {
            const fromPt = landmarks[connection[0]];
            const toPt = landmarks[connection[1]];
            if (fromPt && toPt) {
                ctx.moveTo(fromPt.x * w, fromPt.y * h);
                ctx.lineTo(toPt.x * w, toPt.y * h);
            }
        }
        ctx.stroke();

        // --- ACCENT FEATURE RINGS ---
        const structuralFeatures = [
            { path: FACEMESH_RIGHT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LEFT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LIPS, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_RIGHT_EYEBROW, color: "#00ffff", width: 1.5 },
            { path: FACEMESH_LEFT_EYEBROW, color: "#00ffff", width: 1.5 }
        ];

        structuralFeatures.forEach(feature => {
            ctx.strokeStyle = feature.color;
            ctx.lineWidth = feature.width;
            ctx.beginPath();
            for (const connection of feature.path) {
                const fromPt = landmarks[connection[0]];
                const toPt = landmarks[connection[1]];
                if (fromPt && toPt) {
                    ctx.moveTo(fromPt.x * w, fromPt.y * h);
                    ctx.lineTo(toPt.x * w, toPt.y * h);
                }
            }
            ctx.stroke();
        });

        // --- INSTANT SENSITIVE JUNCTION NODES ---
        // Keeps all dots rendering relative to real coordinates so stretching works flawlessly
        ctx.fillStyle = "#33ffff";
        for (let i = 0; i < landmarks.length; i++) {
            const pt = landmarks[i];
            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.4, 0, 2 * Math.PI);
            ctx.fill();
        }
    } else {
        // Reset telemetry layout if tracking object breaks perspective entirely
        trackDirDisplay.textContent = "FACING: LOST TARGET";
        featuresDisplay.innerHTML = `
            CHIN: <span class="lock-tag">LOST</span><br>
            EYEBROWS: <span class="lock-tag">LOST</span><br>
            EYES: <span class="lock-tag">LOST</span><br>
            LIPS: <span class="lock-tag">LOST</span>
        `;
    }

    ctx.restore();

    // Standard Render Update
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
