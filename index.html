<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Face IQ Scanner Mesh Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #020204; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #scanner-hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 14px 18px; 
            background: rgba(2, 2, 4, 0.9); 
            border: 1px solid rgba(0, 255, 200, 0.4); 
            border-radius: 6px; 
            font-size: 11px; 
            color: #00ffcc;
            backdrop-filter: blur(12px); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            font-family: monospace;
            line-height: 1.6;
            letter-spacing: 1px;
        }
        .scanning-text {
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="scanner-hud">
        <div class="scanning-text">▲ FACIAL IQ SCANNER: MATRIX ACTIVE</div>
        <div id="fps">SYSTEM FPS: --</div>
        <div id="diagnostics">ANALYZING GEOMETRIC PLANES...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const diagDisplay = document.getElementById("diagnostics");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();
let faceTriangles = [];

// Clean contour paths for sharp overlay highlights (Eyes, Brows, Lips)
const HIGHLIGHT_FEATURES = [
    [33, 160, 158, 133, 153, 144, 33], // Left Eye Frame
    [362, 385, 387, 263, 373, 380, 362], // Right Eye Frame
    [70, 63, 105, 66, 107, 55], // Left Eyebrow
    [300, 293, 334, 296, 336, 285], // Right Eyebrow
    [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61] // Outer Lip Bounds
];

// Full skeletal mapping lines for the hands
const HAND_BONES = [
    [0,1], [1,2], [2,3], [3,4],
    [0,5], [5,6], [6,7], [7,8],
    [9,10], [10,11], [11,12],
    [13,14], [14,15], [15,16],
    [0,17], [17,18], [18,19], [19,20],
    [5,9], [9,13], [13,17], [0,5], [0,17]
];

// Full finger-to-wrist perimeter array to wrap the edges of hands perfectly
const HAND_PERIMETER = [0, 1, 2, 3, 4, 3, 2, 1, 5, 6, 7, 8, 7, 6, 9, 10, 11, 12, 11, 10, 13, 14, 15, 16, 15, 14, 17, 18, 19, 20, 19, 18, 17, 0];

async function startScannerEngine() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        faceTriangles = FaceLandmarker.getTrianglesByCpu();

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            requestAnimationFrame(scannerRenderLoop);
        };
    } catch (err) {
        diagDisplay.textContent = "HARDWARE CONFLICT: WEBCAM LOCKED";
        diagDisplay.style.color = "#ff3366";
    }
}

function scannerRenderLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Mirror transform canvas globally so coordinates perfectly lock with video image
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);

        const w = canvas.width;
        const h = canvas.height;

        // --- FACE IQ SHADER MESH RENDERING ---
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];
            diagDisplay.textContent = "SCAN LOG: STRUCTURAL MESH TARGET LOCK";

            // STEP 1: Face IQ Facet Fill Shader Loop
            // Fills each structural triangle with semi-transparent tech green.
            // As you move, the changing triangle angles catch light on screen differently.
            ctx.fillStyle = "rgba(0, 255, 180, 0.08)";
            ctx.beginPath();
            for (let i = 0; i < faceTriangles.length; i += 3) {
                const p1 = face[faceTriangles[i]];
                const p2 = face[faceTriangles[i + 1]];
                const p3 = face[faceTriangles[i + 2]];

                if (p1 && p2 && p3) {
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                    ctx.lineTo(p3.x * w, p3.y * h);
                    ctx.closePath();
                }
            }
            ctx.fill();

            // STEP 2: Dense Wireframe Grid Lines
            ctx.strokeStyle = "rgba(0, 255, 200, 0.16)";
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            for (let i = 0; i < faceTriangles.length; i += 3) {
                const p1 = face[faceTriangles[i]];
                const p2 = face[faceTriangles[i + 1]];
                const p3 = face[faceTriangles[i + 2]];

                if (p1 && p2 && p3) {
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                    ctx.lineTo(p3.x * w, p3.y * h);
                    ctx.closePath();
                }
            }
            ctx.stroke();

            // STEP 3: High-Contrast Scanning Feature Highlights
            ctx.strokeStyle = "rgba(255, 0, 100, 0.8)"; // High-visibility laser pink
            ctx.lineWidth = 1.6;
            HIGHLIGHT_FEATURES.forEach(path => {
                ctx.beginPath();
                path.forEach((idx, step) => {
                    const pt = face[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });

            // STEP 4: Neck Anchor Core Vector
            ctx.strokeStyle = "rgba(0, 160, 255, 0.6)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(face[152].x * w, face[152].y * h); // Bottom of chin
            ctx.lineTo(face[152].x * w, (face[152].y + 0.14) * h); // Drops straight down to track neck orientation
            ctx.stroke();
        } else {
            diagDisplay.textContent = "SCAN LOG: SEEKING ACTIVE BIOMETRICS...";
        }

        // --- FULL EDGE HAND MESH RENDERING ---
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                // 1. Core Bone Structures
                ctx.strokeStyle = "#ffcc00"; // Scanner gold
                ctx.lineWidth = 2.0;
                ctx.beginPath();
                HAND_BONES.forEach(([start, end]) => {
                    const p1 = hand[start];
                    const p2 = hand[end];
                    if (p1 && p2) {
                        ctx.moveTo(p1.x * w, p1.y * h);
                        ctx.lineTo(p2.x * w, p2.y * h);
                    }
                });
                ctx.stroke();

                // 2. Full Finger Boundary Edges (Hooks lines securely across finger sides and tips)
                ctx.strokeStyle = "rgba(255, 204, 0, 0.45)";
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                HAND_PERIMETER.forEach((idx, step) => {
                    const pt = hand[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });
        }

        ctx.restore();
    }

    // Hardware FPS calculation loop
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `SYSTEM FPS: ${currentFps} [GPU HARDWARE BLIT]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(scannerRenderLoop);
}

startScannerEngine();
</script>
</body>
</html>
