<script type="module">

import {
  FaceLandmarker,
  HandLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const status = document.getElementById("status");

let faceLandmarker;
let handLandmarker;

const FACE_LABELS = {
  "Chin":152,
  "Nose Tip":1,
  "Left Eye":33,
  "Right Eye":263,
  "Left Brow":70,
  "Right Brow":300
};

async function initModels() {

  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );

  faceLandmarker = await FaceLandmarker.createFromOptions(
    vision,
    {
      baseOptions:{
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task"
      },
      runningMode:"VIDEO",
      numFaces:1
    }
  );

  handLandmarker = await HandLandmarker.createFromOptions(
    vision,
    {
      baseOptions:{
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task"
      },
      runningMode:"VIDEO",
      numHands:2
    }
  );
}

async function setupCamera() {

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:"user",
      width:{ideal:1280},
      height:{ideal:720}
    }
  });

  video.srcObject = stream;

  return new Promise(resolve=>{
    video.onloadedmetadata = resolve;
  });
}

function drawPoint(x,y,r=3){
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
}

function drawText(text,x,y){

  ctx.font="12px Arial";

  const w=ctx.measureText(text).width;

  ctx.fillStyle="rgba(0,0,0,.7)";
  ctx.fillRect(x-3,y-14,w+6,18);

  ctx.fillStyle="white";
  ctx.fillText(text,x,y);
}

function drawFace(face){

  const w=canvas.width;
  const h=canvas.height;

  ctx.fillStyle="#00ff88";

  for(const p of face){

    drawPoint(
      p.x*w,
      p.y*h,
      1
    );
  }

  ctx.fillStyle="red";

  for(const [name,index] of Object.entries(FACE_LABELS)){

    const p=face[index];

    if(!p) continue;

    const x=p.x*w;
    const y=p.y*h;

    drawPoint(x,y,4);
    drawText(name,x+8,y-6);
  }

  drawFaceOval(face);
}

function drawFaceOval(face){

  const w=canvas.width;
  const h=canvas.height;

  const oval = [
    10,338,297,332,284,251,389,356,454,
    323,361,288,397,365,379,378,400,
    377,152,148,176,149,150,136,172,
    58,132,93,234,127,162,21,54,103,67,109
  ];

  ctx.strokeStyle="cyan";
  ctx.lineWidth=2;

  ctx.beginPath();

  oval.forEach((id,i)=>{

    const p=face[id];

    const x=p.x*w;
    const y=p.y*h;

    if(i===0){
      ctx.moveTo(x,y);
    } else {
      ctx.lineTo(x,y);
    }
  });

  ctx.closePath();
  ctx.stroke();
}

const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20]
];

function drawHand(hand){

  const w=canvas.width;
  const h=canvas.height;

  ctx.strokeStyle="yellow";
  ctx.lineWidth=3;

  HAND_CONNECTIONS.forEach(([a,b])=>{

    const p1=hand[a];
    const p2=hand[b];

    ctx.beginPath();
    ctx.moveTo(p1.x*w,p1.y*h);
    ctx.lineTo(p2.x*w,p2.y*h);
    ctx.stroke();
  });

  ctx.fillStyle="orange";

  hand.forEach(p=>{
    drawPoint(
      p.x*w,
      p.y*h,
      4
    );
  });

  const wrist=hand[0];

  drawText(
    "Hand",
    wrist.x*w+10,
    wrist.y*h
  );
}

let lastTime=-1;

function loop(){

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  if(video.currentTime!==lastTime){

    lastTime=video.currentTime;

    const now=performance.now();

    const faceResults=
      faceLandmarker.detectForVideo(
        video,
        now
      );

    const handResults=
      handLandmarker.detectForVideo(
        video,
        now
      );

    if(faceResults.faceLandmarks.length){

      drawFace(
        faceResults.faceLandmarks[0]
      );
    }

    if(handResults.landmarks){

      handResults.landmarks.forEach(
        hand=>drawHand(hand)
      );
    }

    let msg="";

    if(faceResults.faceLandmarks.length){
      msg+="Face ";
    }

    if(handResults.landmarks?.length){
      msg+=`Hands:${handResults.landmarks.length}`;
    }

    status.textContent=
      msg || "Searching...";
  }

  requestAnimationFrame(loop);
}

async function start(){

  status.textContent="Loading...";

  await initModels();
  await setupCamera();

  status.textContent="Ready";

  loop();
}

start();

</script>
