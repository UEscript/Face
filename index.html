<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Face IQ Mesh Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #040406; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 12px 16px; 
            background: rgba(4, 6, 10, 0.85); 
            border: 1px solid rgba(0, 255, 150, 0.25); 
            border-radius: 8px; 
            font-size: 11px; 
            color: #00ff96;
            backdrop-filter: blur(10px); 
            font-family: monospace;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: HOVERING 3D GEOMETRY ENGINE</div>
        <div id="fps">FPS: -- [NATIVE GPU]</div>
        <div id="status">STATUS: INITIALIZING CAPTURE...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const statusDisplay = document.getElementById("status");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();

// Concentric anatomical loops matching the official face topology grid
const FACE_CONTOURS = [
    [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109], // Outer Frame
    [21, 70, 63, 105, 66, 107, 9, 336, 296, 334, 293, 300, 276, 356], // Brow line connection
    [168, 6, 197, 195, 5, 4, 1, 19, 94, 2], // Nose structural ridge
    [33, 7, 163, 144, 145, 153, 154, 155, 133, 173, 157, 158, 159, 160, 161, 246], // Left Eye ring
    [362, 382, 381, 380, 374, 373, 390, 249, 263, 466, 388, 387, 386, 385, 384, 398], // Right Eye ring
    [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 409, 270, 269, 267, 0, 37, 39, 40, 185], // Lips Outer Perimeter
    [78, 95, 88, 178, 87, 14, 317, 402, 318, 324, 308, 418, 312, 311, 310, 13, 80, 81, 82, 96]   // Lips Inner Perimeter
];

// Structural cross-links to weave the contours together into a smooth 3D grid patch
const FACE_CROSS_LINKS = [
    [21, 33], [54, 7], [103, 163], [67, 144], [109, 145], [10, 153], 
    [338, 374], [297, 373], [332, 390], [284, 249], [251, 263],
    [61, 2], [291, 2], [152, 17], [10, 168], [168, 6], [2, 0]
];

// Precise paths for rendering solid hand surface geometry
const HAND_FINGERS = [
    [0, 1, 2, 3, 4],     // Thumb
    [0, 5, 6, 7, 8],     // Index
    [0, 9, 10, 11, 12],  // Middle
    [0, 13, 14, 15, 16], // Ring
    [0, 17, 18, 19, 20]  // Pinky
];

async function initializeSystem() {
    try {
        statusDisplay.textContent = "STATUS: INITIALIZING HARDWARE...";
        
        // Asks for the camera instantly to bypass iPadOS security lockout
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        video.srcObject = stream;
        
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                resolve();
            };
        });

        statusDisplay.textContent = "STATUS: INTEGRATING MODELS...";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        statusDisplay.textContent = "STATUS: ACTIVE";
        requestAnimationFrame(processingRenderLoop);

    } catch (err) {
        statusDisplay.textContent = "STATUS: CAM INTERRUPT";
        console.error(err);
    }
}

function processingRenderLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        const faceResult = faceLandmarker ? faceLandmarker.detectForVideo(video, timestamp) : null;
        const handResult = handLandmarker ? handLandmarker.detectForVideo(video, timestamp) : null;

        const w = canvas.width;
        const h = canvas.height;

        // --- HIGH-TECH CLEAN FACE MESH (RESEARCH DESIGN) ---
        if (faceResult && faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];

            // 1. Draw structural geometric loop lines
            ctx.strokeStyle = "rgba(0, 255, 180, 0.45)";
            ctx.lineWidth = 1.0;
            FACE_CONTOURS.forEach(contour => {
                ctx.beginPath();
                contour.forEach((idx, step) => {
                    const pt = face[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.closePath();
                ctx.stroke();
            });

            // 2. Draw cross-connecting architecture links to complete the 3D grid appearance
            ctx.beginPath();
            FACE_CROSS_LINKS.forEach(([startIdx, endIdx]) => {
                const p1 = face[startIdx];
                const p2 = face[endIdx];
                if (p1 && p2) {
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                }
            });
            ctx.stroke();

            // 3. Render clean structural node anchors at key tracking intersections
            ctx.fillStyle = "#ff0066";
            const structuralAnchors = [10, 152, 33, 263, 1, 61, 291];
            structuralAnchors.forEach(idx => {
                const pt = face[idx];
                if (pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x * w, pt.y * h, 3.5, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            // 4. Clean neon tracking halos for eyes and lips
            ctx.strokeStyle = "#ff0066";
            ctx.lineWidth = 2.0;
            const trackingTargets = [FACE_CONTOURS[3], FACE_CONTOURS[4], FACE_CONTOURS[5]];
            trackingTargets.forEach(path => {
                ctx.beginPath();
                path.forEach((idx, step) => {
                    const pt = face[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.closePath();
                ctx.stroke();
            });
        }

        // --- MATCHING HOVERING HAND MESH ARCHITECTURE ---
        if (handResult && handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                
                // 1. Solid surface panel fills between finger/palm nodes
                ctx.fillStyle = "rgba(255, 204, 0, 0.18)";
                for (let i = 0; i < HAND_FINGERS.length - 1; i++) {
                    const f1 = HAND_FINGERS[i];
                    const f2 = HAND_FINGERS[i + 1];
                    
                    ctx.beginPath();
                    ctx.moveTo(hand[f1[0]].x * w, hand[f1[0]].y * h);
                    for (let j = 1; j < f1.length; j++) ctx.lineTo(hand[f1[j]].x * w, hand[f1[j]].y * h);
                    for (let j = f2.length - 1; j >= 0; j--) ctx.lineTo(hand[f2[j]].x * w, hand[f2[j]].y * h);
                    ctx.closePath();
                    ctx.fill();
                }

                // 2. High-contrast structural gold wireframe lines
                ctx.strokeStyle = "#ffcc00"; 
                ctx.lineWidth = 2.2;
                HAND_FINGERS.forEach(finger => {
                    ctx.beginPath();
                    finger.forEach((idx, step) => {
                        const pt = hand[idx];
                        if (pt) {
                            if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                            else ctx.lineTo(pt.x * w, pt.y * h);
                        }
                    });
                    ctx.stroke();
                });

                // Cross-link palm base elements to finalize structural grid appearance
                ctx.beginPath();
                ctx.moveTo(hand[5].x * w, hand[5].y * h);
                ctx.lineTo(hand[9].x * w, hand[9].y * h);
                ctx.lineTo(hand[13].x * w, hand[13].y * h);
                ctx.lineTo(hand[17].x * w, hand[17].y * h);
                ctx.stroke();

                // 3. Structural joint node dots
                ctx.fillStyle = "#ffcc00";
                hand.forEach(pt => {
                    ctx.beginPath();
                    ctx.arc(pt.x * w, pt.y * h, 3, 0, 2 * Math.PI);
                    ctx.fill();
                });
            });
        }

        ctx.restore();
    }

    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU NATIVE]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(processingRenderLoop);
}

initializeSystem();
</script>
</body>
</html>
