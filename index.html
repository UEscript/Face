<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Multi-Angle 3D Lock Rig</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffff; border-radius: 8px;
            font-size: 11px; color: #00ffff; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: PROFILE-ADAPTIVE 3D MATRIX</div>
        <div id="view-mode">VIEW: CALCULATING...</div>
        <div id="fps">FPS: --</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const viewDisplay = document.getElementById("view-mode");

let frameCount = 0;
let lastFpsUpdate = performance.now();
window.latestHandResults = null;

const HAND_LINKS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeAdaptiveLock();
});

function initializeAdaptiveLock() {
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, // Crucial for structural lip/eye skin deformations
        minDetectionConfidence: 0.45,
        minTrackingConfidence: 0.45
    });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.45,
        minTrackingConfidence: 0.45
    });

    faceMesh.onResults((results) => {
        renderAdaptiveMatrix(results);
    });

    hands.onResults((results) => {
        window.latestHandResults = results;
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
            await hands.send({ image: video });
        }
    });
    camera.start();
}

function renderAdaptiveMatrix(faceResults) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);

    if (faceResults.multiFaceLandmarks && faceResults.multiFaceLandmarks.length > 0) {
        const landmarks = faceResults.multiFaceLandmarks[0];

        // --- PROFILE DETECTION ENGINE ---
        // Calculate orientation by comparing horizontal distance between nose bridge (1) and outer head bounds
        const leftBoundary = landmarks[234].x;
        const rightBoundary = landmarks[454].x;
        const noseCenter = landmarks[1].x;

        const leftSpan = Math.abs(noseCenter - leftBoundary);
        const rightSpan = Math.abs(rightBoundary - noseCenter);
        const symmetryRatio = leftSpan / rightSpan;

        let isSideProfile = false;
        if (symmetryRatio < 0.35 || symmetryRatio > 2.8) {
            isSideProfile = true;
            viewDisplay.textContent = "VIEW: 3D SIDE PROFILE LOCK";
        } else {
            viewDisplay.textContent = "VIEW: 3D FRONT LOCK";
        }

        // --- ADAPTIVE GRAPHICS DENSITY ---
        // Tone down background wireframe grids for clear face visibility
        ctx.strokeStyle = "rgba(0, 255, 255, 0.12)";
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        
        for (const connection of FACEMESH_TESSELATION) {
            // If side profile is active, skip drawing hidden back-head links to eliminate overlapping "wiggle" artifacts
            if (isSideProfile) {
                const zDepth = (landmarks[connection[0]].z + landmarks[connection[1]].z) / 2;
                if (zDepth > 0.02) continue; 
            }
            
            const from = landmarks[connection[0]];
            const to = landmarks[connection[1]];
            if (from && to) {
                ctx.moveTo(from.x * w, from.y * h);
                ctx.lineTo(to.x * w, to.y * h);
            }
        }
        ctx.stroke();

        // --- STRETCH-COMPLIANT FEATURE PATHS ---
        const featurePaths = [
            { path: FACEMESH_RIGHT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LEFT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LIPS, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_RIGHT_EYEBROW, color: "#00ffff", width: 1.5 },
            { path: FACEMESH_LEFT_EYEBROW, color: "#00ffff", width: 1.5 }
        ];

        featurePaths.forEach(feature => {
            ctx.strokeStyle = feature.color;
            ctx.lineWidth = feature.width;
            ctx.beginPath();
            for (const connection of feature.path) {
                const from = landmarks[connection[0]];
                const to = landmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();
        });

        // Dynamic coordinate node points (React completely to skin stretches)
        ctx.fillStyle = "#33ffff";
        for (let i = 0; i < landmarks.length; i++) {
            const pt = landmarks[i];
            // Discard visual nodes that slip behind perspective planes during side views
            if (isSideProfile && pt.z > 0.03) continue;

            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.4, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    // --- MATCHING CYAN 3D HAND RIGS ---
    const activeHands = window.latestHandResults;
    if (activeHands && activeHands.multiHandLandmarks) {
        activeHands.multiHandLandmarks.forEach(handLandmarks => {
            ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (const connection of HAND_LINKS) {
                const from = handLandmarks[connection[0]];
                const to = handLandmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();

            ctx.fillStyle = "#33ffff";
            for (const pt of handLandmarks) {
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, 2.2, 0, 2 * Math.PI);
                ctx.fill();
            }
        });
    }

    ctx.restore();

    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
