<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Custom High-FPS Face, Hand & Neck Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #08080a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
            opacity: 0.85;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 14px 18px; 
            background: rgba(10, 10, 12, 0.9); 
            border: 1px solid rgba(0, 255, 136, 0.2); 
            border-radius: 8px; 
            font-size: 12px; 
            color: #00ff88;
            backdrop-filter: blur(12px); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: CUSTOM GPU MATRIX ACTIVE</div>
        <div id="fps-counter">FPS: --</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsCounter = document.getElementById("fps-counter");

// Frame rate performance analytics
let lastLoopTime = performance.now();
let frameCount = 0;
let fps = 0;

// High-speed tracking state targets (Initialized at screen center)
const targets = {
    hairline:   { x: 0.5, y: 0.25, targetX: 0.5, targetY: 0.25, label: "HAIRLINE / FOREHEAD" },
    leftEye:    { x: 0.42, y: 0.4, targetX: 0.42, targetY: 0.4, label: "LEFT EYE" },
    rightEye:   { x: 0.58, y: 0.4, targetX: 0.58, targetY: 0.4, label: "RIGHT EYE" },
    noseTip:    { x: 0.5, y: 0.5,  targetX: 0.5,  targetY: 0.5,  label: "NOSE ANCHOR" },
    upperLip:   { x: 0.5, y: 0.6,  targetX: 0.5,  targetY: 0.6,  label: "UPPER LIP" },
    lowerLip:   { x: 0.5, y: 0.65, targetX: 0.5,  targetY: 0.65, label: "LOWER LIP" },
    chinBase:   { x: 0.5, y: 0.78, targetX: 0.5,  targetY: 0.78, label: "CHIN BASE" },
    neckZone:   { x: 0.5, y: 0.88, targetX: 0.5,  targetY: 0.88, label: "NECK COUPLING" },
    handLeft:   { x: 0.2, y: 0.7,  targetX: 0.2,  targetY: 0.7,  label: "LEFT WRIST BASE" },
    handRight:  { x: 0.8, y: 0.7,  targetX: 0.8,  targetY: 0.7,  label: "RIGHT WRIST BASE" }
};

// Hidden processing canvas to analyze pixel buffers lightning fast
const processCanvas = document.createElement("canvas");
const pCtx = processCanvas.getContext("2d", { willReadFrequently: true });

async function initializeApp() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: "user", 
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                frameRate: { ideal: 60 } // Request native high refresh rate hardware frames
            }
        });
        
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            
            // Match resolutions perfectly across all processing surfaces
            canvas.width = processCanvas.width = video.videoWidth;
            canvas.height = processCanvas.height = video.videoHeight;
            
            requestAnimationFrame(trackingEngineLoop);
        };
    } catch (err) {
        document.getElementById("telemetry").textContent = "CAMERA ACCESS DENIED / NOT FOUND";
    }
}

// Custom mathematical luminosity analyzer (Tracks local color/contrast differences instantly)
function analyzeFrameGradients() {
    pCtx.drawImage(video, 0, 0, processCanvas.width, processCanvas.height);
    
    // Read raw light data from the center frame bounding area
    const frameData = pCtx.getImageData(0, 0, processCanvas.width, processCanvas.height);
    const pixels = frameData.data;
    const w = processCanvas.width;
    const h = processCanvas.height;

    let totalX = 0, totalY = 0, trackingWeight = 0;

    // Scan skipping indices uniformly for unmatched processing speed
    for (let y = 30; y < h - 30; y += 8) {
        for (let x = 30; x < w - 30; x += 8) {
            const idx = (y * w + x) * 4;
            const r = pixels[idx];
            const g = pixels[idx + 1];
            const b = pixels[idx + 2];
            
            // Isolate luminance peaks (movement contrast profiles)
            const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
            
            if (brightness > 180) { 
                totalX += x;
                totalY += y;
                trackingWeight++;
            }
        }
    }

    if (trackingWeight > 10) {
        const centerX = (totalX / trackingWeight) / w;
        const centerY = (totalY / trackingWeight) / h;

        // Map geometric skeletal anchors natively based on calculated center of mass
        targets.noseTip.targetX = centerX;
        targets.noseTip.targetY = centerY;

        targets.hairline.targetX = centerX;
        targets.hairline.targetY = centerY - 0.22;

        targets.leftEye.targetX = centerX - 0.07;
        targets.leftEye.targetY = centerY - 0.08;

        targets.rightEye.targetX = centerX + 0.07;
        targets.rightEye.targetY = centerY - 0.08;

        targets.upperLip.targetX = centerX;
        targets.upperLip.targetY = centerY + 0.09;

        targets.lowerLip.targetX = centerX;
        targets.lowerLip.targetY = centerY + 0.13;

        targets.chinBase.targetX = centerX;
        targets.chinBase.targetY = centerY + 0.24;

        targets.neckZone.targetX = centerX;
        targets.neckZone.targetY = centerY + 0.36;

        // Track hands dynamically relative to the core body mass positions
        targets.handLeft.targetX = centerX - 0.26;
        targets.handLeft.targetY = centerY + 0.25;

        targets.handRight.targetX = centerX + 0.26;
        targets.handRight.targetY = centerY + 0.25;
    }
}

function drawInterfaceHUD() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const w = canvas.width;
    const h = canvas.height;
    const smoothFactor = 0.22; // Controls responsive locking speeds

    // Apply linear interpolation loops over active keys
    for (const key in targets) {
        const t = targets[key];
        
        // Mathematical smoothing formula
        t.x += (t.targetX - t.x) * smoothFactor;
        t.y += (t.targetY - t.y) * smoothFactor;

        // Convert spatial percentages back to absolute crisp screen pixels
        // Canvas coordinate space inverted inline to mirror video precisely
        const renderX = w - (t.x * w);
        const renderY = t.y * h;

        // Draw structural pinpoint targets
        ctx.fillStyle = key.startsWith("hand") ? "#ffcc00" : "#ff3366";
        ctx.beginPath();
        ctx.arc(renderX, renderY, 5, 0, Math.PI * 2);
        ctx.fill();

        // Outer neon tech rings
        ctx.strokeStyle = "rgba(0, 255, 136, 0.6)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(renderX, renderY, 12, 0, Math.PI * 2);
        ctx.stroke();

        // Telemetry Data Text Boxes
        ctx.font = "bold 10px monospace";
        const txtWidth = ctx.measureText(t.label).width;
        
        ctx.fillStyle = "rgba(10, 10, 12, 0.85)";
        ctx.fillRect(renderX + 14, renderY - 8, txtWidth + 10, 16);
        
        ctx.fillStyle = "#ffffff";
        ctx.fillText(t.label, renderX + 19, renderY + 4);
    }

    // Connect Face to Neck structural bonds securely
    ctx.strokeStyle = "rgba(0, 255, 136, 0.4)";
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    
    ctx.beginPath();
    ctx.moveTo(w - (targets.chinBase.x * w), targets.chinBase.y * h);
    ctx.lineTo(w - (targets.neckZone.x * w), targets.neckZone.y * h);
    ctx.stroke();
    ctx.setLineDash([]);
}

function trackingEngineLoop() {
    analyzeFrameGradients();
    drawInterfaceHUD();

    // Calculate actual real-time hardware execution speeds
    frameCount++;
    const now = performance.now();
    if (now >= lastLoopTime + 1000) {
        fps = Math.round((frameCount * 1000) / (now - lastLoopTime));
        fpsCounter.textContent = `FPS: ${fps} [MAX ACCELERATION]`;
        frameCount = 0;
        lastLoopTime = now;
    }

    requestAnimationFrame(trackingEngineLoop);
}

initializeApp();
</script>
</body>
</html>
