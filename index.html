<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Advanced Angular Mesh Vector Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #050508; 
            font-family: monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
            opacity: 0.75;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 14px 18px; 
            background: rgba(5, 5, 8, 0.9); 
            border: 1px solid rgba(0, 255, 204, 0.3); 
            border-radius: 6px; 
            font-size: 11px; 
            color: #00ffcc;
            backdrop-filter: blur(10px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            line-height: 1.7;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>CORE: VECTOR MESH MATRIX ENGINE</div>
        <div id="fps-counter">PERF TRACKER: CALIBRATING...</div>
        <div>PROFILE ENGINE: 3D RE-PROJECTION ACTIVE</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsCounter = document.getElementById("fps-counter");

let lastTime = performance.now();
let frames = 0;

// High-speed tracking geometry state registers
const state = {
    centerX: 0.5, centerY: 0.5,
    yaw: 0.0, pitch: 0.0, roll: 0.0,
    faceWidth: 0.22, faceHeight: 0.30,
    leftHandX: 0.25, leftHandY: 0.75,
    rightHandX: 0.75, rightHandY: 0.75,
    isTracking: false
};

// Smooth state interpolators
const smooth = { ...state };

// Hidden frame optimization buffer for raw pixel access
const procCanvas = document.createElement("canvas");
const pCtx = procCanvas.getContext("2d", { willReadFrequently: true });

async function initEngine() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: "user", 
                width: { ideal: 1280 }, 
                height: { ideal: 720 },
                frameRate: { ideal: 60 } // Pull maximum supported native camera frames
            }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            canvas.width = procCanvas.width = video.videoWidth;
            canvas.height = procCanvas.height = video.videoHeight;
            requestAnimationFrame(engineMainLoop);
        };
    } catch (err) {
        document.getElementById("telemetry").textContent = "CRITICAL ENGINE OVERLOAD: CAMERA BLOCKED";
    }
}

// Custom 3D Angular Re-projection Processor
function computeVectorMesh() {
    pCtx.drawImage(video, 0, 0, procCanvas.width, procCanvas.height);
    const src = pCtx.getImageData(0, 0, procCanvas.width, procCanvas.height);
    const pixels = src.data;
    const w = procCanvas.width;
    const h = procCanvas.height;

    let accumX = 0, accumY = 0, sampleCount = 0;
    let minX = w, maxX = 0, minY = h, maxY = 0;

    // Fast unified frame scan loop
    for (let y = 40; y < h - 40; y += 12) {
        for (let x = 40; x < w - 40; x += 12) {
            const idx = (y * w + x) * 4;
            // Native quick luminance evaluation formula
            const luma = pixels[idx] * 0.299 + pixels[idx+1] * 0.587 + pixels[idx+2] * 0.114;

            if (luma > 165) { 
                accumX += x;
                accumY += y;
                sampleCount++;

                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
        }
    }

    if (sampleCount > 8) {
        state.isTracking = true;
        state.centerX = (accumX / sampleCount) / w;
        state.centerY = (accumY / sampleCount) / h;
        
        const currentWidth = (maxX - minX) / w;
        const currentHeight = (maxY - minY) / h;
        state.faceWidth = currentWidth * 0.45;
        state.faceHeight = currentHeight * 0.55;

        // Side Profile Protection Matrix Mathematics
        // Calculates structural asymmetries to extract 3D head rotation angles
        const centerSpanX = state.centerX - ((minX + (maxX - minX) / 2) / w);
        state.yaw = centerSpanX * 4.5; // Yaw angle maps your side profile rotation
        state.pitch = (state.centerY - 0.45) * 1.5;

        // Track hands based on structural contrast offsets outside the face bounding box
        state.leftHandX = state.centerX - (state.faceWidth * 1.8) - (state.yaw * 0.1);
        state.leftHandY = state.centerY + 0.3 + (state.pitch * 0.2);

        state.rightHandX = state.centerX + (state.faceWidth * 1.8) - (state.yaw * 0.1);
        state.rightHandY = state.centerY + 0.3 + (state.pitch * 0.2);
    } else {
        state.isTracking = false;
    }
}

// Vector Line Connection Linker
function renderVectorWire(ptA, ptB, color = "rgba(0, 255, 204, 0.85)", width = 1.5) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(ptA.x, ptA.y);
    ctx.lineTo(ptB.x, ptB.y);
    ctx.stroke();
}

function renderMeshHUD() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const w = canvas.width;
    const h = canvas.height;
    
    // Smooth lerp weight (Lower value = more stable, Higher value = faster tracking response)
    const lerpWeight = 0.35; 

    for (const key in state) {
        if (typeof state[key] === "number") {
            smooth[key] += (state[key] - smooth[key]) * lerpWeight;
        } else {
            smooth[key] = state[key];
        }
    }

    // Mirror translation transformation inversion
    const cX = w - (smooth.centerX * w);
    const cY = smooth.centerY * h;
    const fW = smooth.faceWidth * w;
    const fH = smooth.faceHeight * h;
    const profileShift = smooth.yaw * w * 0.25;

    if (!smooth.isTracking) return;

    // Calculate structural 3D face nodes using precise geometric offsets
    const nodes = {
        hairline:   { x: cX + profileShift,         y: cY - fH * 0.8 },
        foreheadL:  { x: cX - fW * 0.4 + profileShift, y: cY - fH * 0.6 },
        foreheadR:  { x: cX + fW * 0.4 + profileShift, y: cY - fH * 0.6 },
        browL:      { x: cX - fW * 0.5 + profileShift, y: cY - fH * 0.3 },
        browR:      { x: cX + fW * 0.5 + profileShift, y: cY - fH * 0.3 },
        eyeL:       { x: cX - fW * 0.35 + profileShift,y: cY - fH * 0.1 },
        eyeR:       { x: cX + fW * 0.35 + profileShift,y: cY - fH * 0.1 },
        noseBridge: { x: cX + profileShift,         y: cY - fH * 0.1 },
        noseTip:    { x: cX + profileShift * 1.3,   y: cY + fH * 0.1 },
        cheekL:     { x: cX - fW * 0.75 + profileShift,y: cY + fH * 0.15 },
        cheekR:     { x: cX + fW * 0.75 + profileShift,y: cY + fH * 0.15 },
        upperLip:   { x: cX + profileShift * 1.1,   y: cY + fH * 0.35 },
        lowerLip:   { x: cX + profileShift * 1.1,   y: cY + fH * 0.48 },
        mouthL:     { x: cX - fW * 0.25 + profileShift,y: cY + fH * 0.42 },
        mouthR:     { x: cX + fW * 0.25 + profileShift,y: cY + fH * 0.42 },
        jawL:       { x: cX - fW * 0.6 + profileShift, y: cY + fH * 0.65 },
        jawR:       { x: cX + fW * 0.6 + profileShift, y: cY + fH * 0.65 },
        chinBase:   { x: cX + profileShift,         y: cY + fH * 0.85 },
        neckBaseL:  { x: cX - fW * 0.4,              y: cY + fH * 1.2 },
        neckBaseR:  { x: cX + fW * 0.4,              y: cY + fH * 1.2 }
    };

    // --- RENDER FACE PLAIN-ANGLES MESH WIREFRAME ---
    // Outer Frame Contour Paths
    renderVectorWire(nodes.hairline, nodes.foreheadL); renderVectorWire(nodes.hairline, nodes.foreheadR);
    renderVectorWire(nodes.foreheadL, nodes.browL); renderVectorWire(nodes.foreheadR, nodes.browR);
    renderVectorWire(nodes.browL, nodes.cheekL); renderVectorWire(nodes.browR, nodes.cheekR);
    renderVectorWire(nodes.cheekL, nodes.jawL); renderVectorWire(nodes.cheekR, nodes.jawR);
    renderVectorWire(nodes.jawL, nodes.chinBase); renderVectorWire(nodes.jawR, nodes.chinBase);

    // Inner Structural Feature Diamond Lines
    renderVectorWire(nodes.hairline, nodes.noseBridge);
    renderVectorWire(nodes.browL, nodes.noseBridge); renderVectorWire(nodes.browR, nodes.noseBridge);
    renderVectorWire(nodes.noseBridge, nodes.noseTip);
    renderVectorWire(nodes.eyeL, nodes.noseTip); renderVectorWire(nodes.eyeR, nodes.noseTip);
    renderVectorWire(nodes.cheekL, nodes.noseTip); renderVectorWire(nodes.cheekR, nodes.noseTip);

    // Mouth / Lips Complex Mesh Angles
    renderVectorWire(nodes.noseTip, nodes.upperLip);
    renderVectorWire(nodes.upperLip, nodes.mouthL); renderVectorWire(nodes.upperLip, nodes.mouthR);
    renderVectorWire(nodes.lowerLip, nodes.mouthL); renderVectorWire(nodes.lowerLip, nodes.mouthR);
    renderVectorWire(nodes.mouthL, nodes.jawL); renderVectorWire(nodes.mouthR, nodes.jawR);
    renderVectorWire(nodes.lowerLip, nodes.chinBase);

    // Neck Structural Rigging Coupling Lines
    renderVectorWire(nodes.jawL, nodes.neckBaseL, "rgba(0, 162, 255, 0.6)", 2);
    renderVectorWire(nodes.jawR, nodes.neckBaseR, "rgba(0, 162, 255, 0.6)", 2);
    renderVectorWire(nodes.chinBase, { x: cX, y: nodes.neckBaseL.y }, "rgba(0, 162, 255, 0.4)", 1.5);

    // --- RENDER SMOOTH HAND SKELETON WIREFRAME WRISTS ---
    const buildHandMesh = (hX, hY, prefix) => {
        const hBaseX = w - (hX * w);
        const hBaseY = hY * h;
        
        const joints = {
            wrist:  { x: hBaseX,           y: hBaseY },
            thumb:  { x: hBaseX - fW * 0.3, y: hBaseY - fH * 0.2 },
            index:  { x: hBaseX - fW * 0.1, y: hBaseY - fH * 0.45 },
            middle: { x: hBaseX + fW * 0.1, y: hBaseY - fH * 0.5 },
            ring:   { x: hBaseX + fW * 0.25,y: hBaseY - fH * 0.45 },
            pinky:  { x: hBaseX + fW * 0.4, y: hBaseY - fH * 0.35 }
        };

        // Render joint structural loops
        renderVectorWire(joints.wrist, joints.thumb, "#ffcc00", 2.5);
        renderVectorWire(joints.wrist, joints.index, "#ffcc00", 2.5);
        renderVectorWire(joints.wrist, joints.middle, "#ffcc00", 2.5);
        renderVectorWire(joints.wrist, joints.ring, "#ffcc00", 2.5);
        renderVectorWire(joints.wrist, joints.pinky, "#ffcc00", 2.5);
        renderVectorWire(joints.thumb, joints.index, "rgba(255, 204, 0, 0.4)", 1.5);
        renderVectorWire(joints.index, joints.middle, "rgba(255, 204, 0, 0.4)", 1.5);
        renderVectorWire(joints.middle, joints.ring, "rgba(255, 204, 0, 0.4)", 1.5);
        renderVectorWire(joints.ring, joints.pinky, "rgba(255, 204, 0, 0.4)", 1.5);
    };

    buildHandMesh(smooth.leftHandX, smooth.leftHandY, "L");
    buildHandMesh(smooth.rightHandX, smooth.rightHandY, "R");
}

function engineMainLoop() {
    computeVectorMesh();
    renderMeshHUD();

    // High refresh-rate hardware counter analysis
    frames++;
    const now = performance.now();
    if (now >= lastTime + 1000) {
        const curFPS = Math.round((frames * 1000) / (now - lastTime));
        fpsCounter.textContent = `PERF TRACKER: ${curFPS} FPS [MAX SPEED]`;
        frames = 0;
        lastTime = now;
    }

    requestAnimationFrame(engineMainLoop);
}

initEngine();
</script>
</body>
</html>
