<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dynamic Vector 3D Matrix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffff; border-radius: 8px;
            font-size: 11px; color: #00ffff; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: MATRIX V2 (VECTOR ANGLE ENGINE)</div>
        <div id="orientation">ANGLE: CALCULATING...</div>
        <div id="fps">FPS: --</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const orientationDisplay = document.getElementById("orientation");

let frameCount = 0;
let lastFpsUpdate = performance.now();

navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeVectorEngine();
});

function initializeVectorEngine() {
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, // Forces precise tracking along skin boundaries
        minDetectionConfidence: 0.4,
        minTrackingConfidence: 0.4
    });

    faceMesh.onResults((results) => {
        renderVectorMatrix(results);
    });

    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
        }
    });
    camera.start();
}

function renderVectorMatrix(results) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];

        // --- TRUE 3D VECTOR ORIENTATION CALCULATION ---
        // We track the relative depth difference between the center tip of the nose (1)
        // and the base structural jaw pivot points to get the true side rotation vector.
        const nose = landmarks[1];
        const leftCheek = landmarks[234];
        const rightCheek = landmarks[454];

        // Compute the directional vector bias
        const midX = (leftCheek.x + rightCheek.x) / 2;
        const rotationBias = nose.x - midX; 

        let viewMode = "FRONT PROFILE";
        let hideBackPoints = false;

        if (rotationBias < -0.04) {
            viewMode = "SIDE PROFILE (LOOKING RIGHT)";
            hideBackPoints = true;
        } else if (rotationBias > 0.04) {
            viewMode = "SIDE PROFILE (LOOKING LEFT)";
            hideBackPoints = true;
        }
        orientationDisplay.textContent = `VIEW: ${viewMode}`;

        // --- RENDERING METHOD (NO SOLID COLOR FILLING) ---
        // Explicitly using individual line paths ensures it won't fill with green solid blocks
        ctx.strokeStyle = "rgba(0, 255, 255, 0.2)";
        ctx.lineWidth = 0.8;
        
        for (const connection of FACEMESH_TESSELATION) {
            const fromPt = landmarks[connection[0]];
            const toPt = landmarks[connection[1]];

            if (fromPt && toPt) {
                // Eliminate lines that turn behind the side profile view space
                if (hideBackPoints) {
                    if (rotationBias < -0.04 && (fromPt.z > 0.01 || toPt.z > 0.01)) continue;
                    if (rotationBias > 0.04 && (fromPt.z > 0.01 || toPt.z > 0.01)) continue;
                }

                ctx.beginPath();
                ctx.moveTo(fromPt.x * w, fromPt.y * h);
                ctx.lineTo(toPt.x * w, toPt.y * h);
                ctx.stroke();
            }
        }

        // --- FIXED HIGH-CONTRAST FEATURE LINES ---
        const features = [
            { path: FACEMESH_RIGHT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LEFT_EYE, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_LIPS, color: "#00ffff", width: 1.8 },
            { path: FACEMESH_RIGHT_EYEBROW, color: "#00ffff", width: 1.5 },
            { path: FACEMESH_LEFT_EYEBROW, color: "#00ffff", width: 1.5 }
        ];

        features.forEach(feature => {
            ctx.strokeStyle = feature.color;
            ctx.lineWidth = feature.width;
            ctx.beginPath();
            for (const connection of feature.path) {
                const fromPt = landmarks[connection[0]];
                const toPt = landmarks[connection[1]];
                if (fromPt && toPt) {
                    ctx.moveTo(fromPt.x * w, fromPt.y * h);
                    ctx.lineTo(toPt.x * w, toPt.y * h);
                }
            }
            ctx.stroke();
        });

        // --- RAW NODE OVERLAY (STRETCH SENSITIVE) ---
        // Dots map directly to your face coordinates with zero delay filters
        ctx.fillStyle = "#33ffff";
        for (let i = 0; i < landmarks.length; i++) {
            const pt = landmarks[i];
            
            if (hideBackPoints) {
                if (rotationBias < -0.04 && pt.z > 0.015) continue;
                if (rotationBias > 0.04 && pt.z > 0.015) continue;
            }

            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.5, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    ctx.restore();

    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
