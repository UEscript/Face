<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Optimized 3D Tracking Matrix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(0, 0, 0, 0.85);
            border: 1px solid #00ffff; border-radius: 8px;
            font-size: 11px; color: #00ffff; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: UNIFIED HARMONIC ENGINE</div>
        <div id="fps">FPS: -- [GPU SMOOTH]</div>
        <div id="status">STATUS: BOOTING...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
// Using unified Tasks Vision to process face and hands in one single pass
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const statusDisplay = document.getElementById("status");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();

// Smooth Cache
let smoothFace = [];
let smoothHands = [];
const SMOOTH_ALPHA = 0.35; // Balance point between latency response and jitter reduction

// Direct connections from official MediaPipe topology maps
const EYE_RIGHT = [[33,7],[7,163],[163,144],[144,145],[145,153],[153,154],[154,155],[155,133],[133,173],[173,157],[157,158],[158,159],[159,160],[160,161],[161,246],[246,33]];
const EYE_LEFT = [[263,249],[249,390],[390,373],[373,374],[374,380],[380,381],[381,382],[382,362],[362,398],[398,384],[384,385],[385,386],[386,387],[387,388],[388,466],[466,263]];
const LIPS_OUTER = [[61,146],[146,91],[91,181],[181,84],[84,17],[17,314],[314,405],[405,321],[321,375],[375,291],[291,409],[409,270],[270,269],[269,267],[267,0],[0,37],[37,39],[39,40],[40,185],[185,61]];
const LIPS_INNER = [[78,95],[95,88],[88,178],[178,87],[87,14],[14,317],[317,402],[402,318],[318,324],[324,308],[308,418],[418,312],[312,311],[311,310],[310,13],[13,80],[80,81],[81,82],[82,96],[96,78]];
const BROW_RIGHT = [[70,63],[63,105],[105,66],[66,107],[107,55],[55,65],[65,52],[52,53],[53,46]];
const BROW_LEFT = [[336,296],[296,334],[334,293],[293,300],[300,276],[276,283],[283,282],[282,295],[295,285]];
const CONTOUR_OVAL = [[10,338],[338,297],[297,332],[332,284],[284,251],[251,389],[389,356],[356,454],[454,323],[323,361],[361,288],[288,397],[397,365],[365,379],[379,378],[378,400],[400,377],[377,152],[152,148],[148,176],[176,149],[149,150],[150,136],[136,172],[172,58],[58,132],[132,93],[93,234],[234,127],[127,162],[162,21],[21,54],[54,103],[103,67],[67,109],[109,10]];

const HAND_LINKS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[9,10],[10,11],[11,12],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

// Immediate hardware acquisition
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    setupUnifiedPipelines();
});

async function setupUnifiedPipelines() {
    statusDisplay.textContent = "STATUS: INITIALIZING ASSETS...";
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task", delegate: "GPU" },
        runningMode: "VIDEO", numFaces: 1
    });

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task", delegate: "GPU" },
        runningMode: "VIDEO", numHands: 2
    });

    statusDisplay.textContent = "STATUS: OPERATIONAL";
    requestAnimationFrame(renderLoop);
}

function processFilter(raw, cached) {
    if (!cached || cached.length !== raw.length) return [...raw];
    return raw.map((pt, idx) => ({
        x: cached[idx].x + (pt.x - cached[idx].x) * SMOOTH_ALPHA,
        y: cached[idx].y + (pt.y - cached[idx].y) * SMOOTH_ALPHA
    }));
}

function drawHighContrastMatrix(ctx, map, pts, w, h, lineColor, nodeColor, lineW, nodeSize) {
    // 1. Structural Line Connectivity Pass
    ctx.strokeStyle = lineColor;
    ctx.lineWidth = lineW;
    ctx.beginPath();
    map.forEach(([start, end]) => {
        const p1 = pts[start];
        const p2 = pts[end];
        if (p1 && p2) {
            ctx.moveTo(p1.x * w, p1.y * h);
            ctx.lineTo(p2.x * w, p2.y * h);
        }
    });
    ctx.stroke();

    // 2. Extruded Node Rendering Pass directly on line junctions
    map.forEach(([start, end]) => {
        [pts[start], pts[end]].forEach(pt => {
            if (pt) {
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, nodeSize + 1.0, 0, 2 * Math.PI);
                ctx.fillStyle = "#000000";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, nodeSize, 0, 2 * Math.PI);
                ctx.fillStyle = nodeColor;
                ctx.fill();
            }
        });
    });
}

function renderLoop() {
    if (video.readyState >= 2) {
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
        }

        const now = performance.now();
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);

            const w = canvas.width;
            const h = canvas.height;

            // Direct execution of single pass face markers
            const faceOut = faceLandmarker ? faceLandmarker.detectForVideo(video, now) : null;
            if (faceOut && faceOut.faceLandmarks && faceOut.faceLandmarks.length > 0) {
                smoothFace = processFilter(faceOut.faceLandmarks[0], smoothFace);

                // External Oval Perimeter Setup
                drawHighContrastMatrix(ctx, CONTOUR_OVAL, smoothFace, w, h, "#00ffff", "#33ffff", 1.8, 2.0);
                
                // Eyebrow Structs
                drawHighContrastMatrix(ctx, BROW_RIGHT, smoothFace, w, h, "#00ffff", "#33ffff", 1.8, 2.0);
                drawHighContrastMatrix(ctx, BROW_LEFT, smoothFace, w, h, "#00ffff", "#33ffff", 1.8, 2.0);

                // High Contrast Target Scanners (Lips & Eyes)
                drawHighContrastMatrix(ctx, EYE_RIGHT, smoothFace, w, h, "#ff0055", "#ff3385", 2.2, 2.8);
                drawHighContrastMatrix(ctx, EYE_LEFT, smoothFace, w, h, "#ff0055", "#ff3385", 2.2, 2.8);
                drawHighContrastMatrix(ctx, LIPS_OUTER, smoothFace, w, h, "#ff0055", "#ff3385", 2.2, 2.8);
                drawHighContrastMatrix(ctx, LIPS_INNER, smoothFace, w, h, "#ff0055", "#ff3385", 1.8, 2.2);
            }

            // Direct execution of single pass hand skeletons
            const handOut = handLandmarker ? handLandmarker.detectForVideo(video, now) : null;
            if (handOut && handOut.landmarks && handOut.landmarks.length > 0) {
                handOut.landmarks.forEach((rawHand, idx) => {
                    smoothHands[idx] = processFilter(rawHand, smoothHands[idx]);
                    drawHighContrastMatrix(ctx, HAND_LINKS, smoothHands[idx], w, h, "#ffcc00", "#ffee55", 2.5, 3.5);
                });
            } else {
                smoothHands = [];
            }

            ctx.restore();
        }

        frameCount++;
        if (now >= lastFpsUpdate + 1000) {
            fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))}`;
            frameCount = 0;
            lastFpsUpdate = now;
        }
    }
    requestAnimationFrame(renderLoop);
}
</script>
</body>
</html>
