<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>High-Performance Angular Mesh Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #050508; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 12px 16px; 
            background: rgba(5, 5, 8, 0.85); 
            border: 1px solid rgba(0, 255, 136, 0.3); 
            border-radius: 8px; 
            font-size: 12px; 
            color: #00ff88;
            backdrop-filter: blur(10px); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-family: monospace;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>ENGINE: REAL-TIME GEOMETRIC WIREFRAME</div>
        <div id="fps">FPS: --</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();

// Grouping indices together to create angular mesh boundaries on the face
const MESH_LINES = {
    outline: [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109, 10],
    leftEye: [33, 160, 158, 133, 153, 144, 33],
    rightEye: [362, 385, 387, 263, 373, 380, 362],
    leftBrow: [70, 63, 105, 66, 107, 55],
    rightBrow: [300, 293, 334, 296, 336, 285],
    noseRidge: [6, 197, 195, 5],
    noseBase: [102, 64, 2, 294, 331],
    outerLips: [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61],
    innerLips: [78, 191, 80, 81, 82, 13, 312, 311, 310, 415, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78]
};

// Connections to link face structure down to neck anchors
const NECK_CONNECTIONS = [
    { from: 152, to: 148 }, // Chin to lower left throat
    { from: 152, to: 377 }, // Chin to lower right throat
    { from: 234, to: 58 },   // Left cheek to jaw hinge
    { from: 454, to: 288 }  // Right cheek to jaw hinge
];

// Structural bone mapping for hands
const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],       // Thumb
    [0,5], [5,6], [6,7], [7,8],       // Index
    [9,10], [10,11], [11,12],         // Middle
    [13,14], [14,15], [15,16],        // Ring
    [0,17], [17,18], [18,19], [19,20], // Pinky
    [5,9], [9,13], [13,17]             // Palm Frame
];

async function initializeTracking() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            requestAnimationFrame(processingLoop);
        };
    } catch (err) {
        console.error("Initialization failed: ", err);
    }
}

function drawWireframePath(points, indices, color, width = 2) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    
    let first = true;
    for (const idx of indices) {
        const pt = points[idx];
        if (!pt) continue;
        
        const x = pt.x * canvas.width;
        const y = pt.y * canvas.height;
        
        if (first) {
            ctx.moveTo(x, y);
            first = false;
        } else {
            ctx.lineTo(x, y);
        }
    }
    ctx.stroke();
}

function processingLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Mirror canvas globally to sync with mirrored video feed layout
        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        // Live hardware inference execution
        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);

        const w = canvas.width;
        const h = canvas.height;

        // Render Angular Face Mesh
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];

            // Render structural facet maps
            drawWireframePath(face, MESH_LINES.outline, "#00ffcc", 2.5);
            drawWireframePath(face, MESH_LINES.leftEye, "#ff3366", 1.5);
            drawWireframePath(face, MESH_LINES.rightEye, "#ff3366", 1.5);
            drawWireframePath(face, MESH_LINES.leftBrow, "#00ffcc", 2);
            drawWireframePath(face, MESH_LINES.rightBrow, "#00ffcc", 2);
            drawWireframePath(face, MESH_LINES.noseRidge, "#00ffcc", 2);
            drawWireframePath(face, MESH_LINES.noseBase, "#00ffcc", 2);
            drawWireframePath(face, MESH_LINES.outerLips, "#ff3366", 2);
            drawWireframePath(face, MESH_LINES.innerLips, "#ff3366", 1.5);

            // Dynamic Cross-Facet Lines (Creates the angular planes on the face)
            ctx.strokeStyle = "rgba(0, 255, 204, 0.25)";
            ctx.lineWidth = 1;
            
            // Connect eyebrows to nose bridge
            ctx.beginPath();
            ctx.moveTo(face[55].x * w, face[55].y * h); ctx.lineTo(face[6].x * w, face[6].y * h);
            ctx.lineTo(face[285].x * w, face[285].y * h);
            
            // Connect eyes to cheeks to nose
            ctx.moveTo(face[133].x * w, face[133].y * h); ctx.lineTo(face[234].x * w, face[234].y * h); ctx.lineTo(face[2].x * w, face[2].y * h);
            ctx.moveTo(face[362].x * w, face[362].y * h); ctx.lineTo(face[454].x * w, face[454].y * h); ctx.lineTo(face[2].x * w, face[2].y * h);
            ctx.stroke();

            // Render Neck Rigging Coupling
            ctx.strokeStyle = "rgba(0, 162, 255, 0.6)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            NECK_CONNECTIONS.forEach(edge => {
                const p1 = face[edge.from];
                const p2 = face[edge.to];
                if (p1 && p2) {
                    ctx.moveTo(p1.x * w, p1.y * h);
                    ctx.lineTo(p2.x * w, p2.y * h);
                }
            });
            ctx.stroke();
        }

        // Render Hand Wireframes
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                ctx.strokeStyle = "#ffcc00";
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                
                HAND_CONNECTIONS.forEach(([start, end]) => {
                    const p1 = hand[start];
                    const p2 = hand[end];
                    if (p1 && p2) {
                        ctx.moveTo(p1.x * w, p1.y * h);
                        ctx.lineTo(p2.x * w, p2.y * h);
                    }
                });
                ctx.stroke();

                // Cross-connect knuckles to show hand surface angles
                ctx.strokeStyle = "rgba(255, 204, 0, 0.3)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(hand[5].x * w, hand[5].y * h);
                for(let k = 9; k <= 17; k += 4) {
                    ctx.lineTo(hand[k].x * w, hand[k].y * h);
                }
                ctx.stroke();
            });
        }

        ctx.restore();
    }

    // Performance FPS metrics calculation
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU ACCELERATED]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(processingLoop);
}

initializeTracking();
</script>
</body>
</html>
