<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Spatial Geometry Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #020203; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #hud { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 14px 18px; 
            background: rgba(2, 2, 3, 0.9); 
            border: 1px solid #00ff66; 
            border-radius: 6px; 
            font-size: 11px; 
            color: #00ff66;
            backdrop-filter: blur(10px); 
            font-family: monospace;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div>MATRIX: SOLID 3D GEOMETRY SHADER</div>
        <div id="fps">FPS: --</div>
        <div id="tracking-state">GEOMETRY MASK: CALCULATING...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const stateDisplay = document.getElementById("tracking-state");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();
let faceTriangles = [];

const HAND_TRIANGLES = [
    [0,1,2], [0,2,5], [2,3,4], [2,4,5],       
    [5,6,7], [5,7,8], [5,9,6],                
    [9,10,11], [9,11,12], [9,13,10],          
    [13,14,15], [13,15,16], [13,17,14],       
    [17,18,19], [17,19,20], [0,17,13], [0,13,9] 
];

async function startGeometryEngine() {
    try {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        faceTriangles = FaceLandmarker.getTrianglesByCpu();

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        
        video.srcObject = stream;
        
        // Anti-Lock Change: Explicitly waiting for hardware frames to stream before running calculations
        video.addEventListener("playing", () => {
            requestAnimationFrame(renderLoop);
        });
    } catch (err) {
        stateDisplay.textContent = "CRITICAL BOOT FAULT";
        console.error(err);
    }
}

function renderLoop() {
    // Safety check: skip the processing frame if video dimensions aren't fully resolved yet
    if (!video.videoWidth || !video.videoHeight) {
        requestAnimationFrame(renderLoop);
        return;
    }

    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    // Only process if the webcam has actually sent a brand new frame
    if (video.currentTime !== lastVideoTime && video.readyState >= 3) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);

        const w = canvas.width;
        const h = canvas.height;

        // --- 3D FACE SOLID MASK SHADER ---
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];
            stateDisplay.textContent = "GEOMETRY MASK: SOLID LOCK";

            for (let i = 0; i < faceTriangles.length; i += 3) {
                const idx1 = faceTriangles[i];
                const idx2 = faceTriangles[i + 1];
                const idx3 = faceTriangles[i + 2];

                const p1 = face[idx1];
                const p2 = face[idx2];
                const p3 = face[idx3];

                if (p1 && p2 && p3) {
                    const x1 = p1.x * w, y1 = p1.y * h, z1 = p1.z * w;
                    const x2 = p2.x * w, y2 = p2.y * h, z2 = p2.z * w;
                    const x3 = p3.x * w, y3 = p3.y * h, z3 = p3.z * w;

                    const v1x = x2 - x1, v1y = y2 - y1, v1z = z2 - z1;
                    const v2x = x3 - x1, v2y = y3 - y1, v2z = z3 - z1;

                    const nx = v1y * v2z - v1z * v2y;
                    const ny = v1z * v2x - v1x * v2z;
                    const nz = v1x * v2y - v1y * v2x;
                    
                    const length = Math.sqrt(nx*nx + ny*ny + nz*nz);
                    
                    let lighting = 0.5; 
                    if (length > 0) {
                        lighting = Math.max(0.1, Math.min(1.0, (nx * 0.3 + ny * -0.4 + nz * 0.9) / length));
                    }

                    const r = Math.floor(25 + lighting * 45);
                    const g = Math.floor(75 + lighting * 120);
                    const b = Math.floor(40 + lighting * 70);
                    
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.72)`;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineTo(x3, y3);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = "rgba(0, 255, 110, 0.28)";
                    ctx.lineWidth = 0.45;
                    ctx.stroke();
                }
            }
        } else {
            stateDisplay.textContent = "GEOMETRY MASK: SEEKING DATA...";
        }

        // --- 3D SOLID HAND SHELL SHADER ---
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                ctx.fillStyle = "rgba(0, 210, 255, 0.22)"; 
                ctx.beginPath();
                HAND_TRIANGLES.forEach(([idxA, idxB, idxC]) => {
                    const pA = hand[idxA];
                    const pB = hand[idxB];
                    const pC = hand[idxC];
                    if (pA && pB && pC) {
                        ctx.moveTo(pA.x * w, pA.y * h);
                        ctx.lineTo(pB.x * w, pB.y * h);
                        ctx.lineTo(pC.x * w, pC.y * h);
                        ctx.closePath();
                    }
                });
                ctx.fill();

                ctx.strokeStyle = "#00ccff";
                ctx.lineWidth = 1.6;
                ctx.beginPath();
                HAND_TRIANGLES.forEach(([idxA, idxB, idxC]) => {
                    const pA = hand[idxA];
                    const pB = hand[idxB];
                    if (pA && pB) {
                        ctx.moveTo(pA.x * w, pA.y * h);
                        ctx.lineTo(pB.x * w, pB.y * h);
                    }
                });
                ctx.stroke();
            });
        }

        ctx.restore();
    }

    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        fpsDisplay.textContent = `FPS: ${Math.round((frameCount * 1000) / (now - lastFpsUpdate))} [3D MATRIX DELAY LOCK]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(renderLoop);
}

startGeometryEngine();
</script>
</body>
</html>
