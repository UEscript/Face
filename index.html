<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>3D Face IQ Mesh Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #040406; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
        }
        #app { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
        }
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 1; 
            transform: scaleX(-1);
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 2; 
            pointer-events: none;
        }
        #telemetry { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            padding: 12px 16px; 
            background: rgba(4, 4, 6, 0.9); 
            border: 1px solid rgba(0, 255, 150, 0.3); 
            border-radius: 8px; 
            font-size: 12px; 
            color: #00ff96;
            backdrop-filter: blur(10px); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            font-family: monospace;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: FACIAL IQ GEOMETRY ENGINE</div>
        <div id="fps">FPS: --</div>
        <div id="status">STATUS: INITIALIZING CAM FEED...</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script type="module">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");
const statusDisplay = document.getElementById("status");

let faceLandmarker;
let handLandmarker;
let lastVideoTime = -1;
let frameCount = 0;
let lastFpsUpdate = performance.now();
let faceTriangles = [];

const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],           
    [0,5], [5,6], [6,7], [7,8],           
    [9,10], [10,11], [11,12],             
    [13,14], [14,15], [15,16],            
    [0,17], [17,18], [18,19], [19,20],    
    [5,9], [9,13], [13,17],                
    [0,5], [0,17]                         
];

const HAND_EDGES = [0, 1, 2, 3, 4, 3, 2, 1, 5, 6, 7, 8, 7, 6, 9, 10, 11, 12, 11, 10, 13, 14, 15, 16, 15, 14, 17, 18, 19, 20, 19, 18, 17, 0];

async function initializeSystem() {
    try {
        statusDisplay.textContent = "STATUS: REQUESTING HARDWARE FEED...";
        
        // CAMERA FIRST: Exactly like your original, working version
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60 } }
        });
        video.srcObject = stream;
        
        // Wait for metadata so the video dimensions are active
        await new Promise((resolve) => {
            video.onloadedmetadata = () => {
                video.play();
                resolve();
            };
        });

        statusDisplay.textContent = "STATUS: DOWNLOADING TARGET MODELS...";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numFaces: 1
        });

        handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
                delegate: "GPU"
            },
            runningMode: "VIDEO",
            numHands: 2
        });

        faceTriangles = FaceLandmarker.getTrianglesByCpu();

        statusDisplay.textContent = "STATUS: LOCK ACQUIRED";
        requestAnimationFrame(processingRenderLoop);

    } catch (err) {
        statusDisplay.textContent = "STATUS: CAM FAULT";
        console.error(err);
    }
}

function processingRenderLoop() {
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
    }

    const timestamp = performance.now();

    if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);

        const faceResult = faceLandmarker.detectForVideo(video, timestamp);
        const handResult = handLandmarker.detectForVideo(video, timestamp);

        const w = canvas.width;
        const h = canvas.height;

        // --- SOLID 3D MASK SHADER ---
        if (faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
            const face = faceResult.faceLandmarks[0];

            for (let i = 0; i < faceTriangles.length; i += 3) {
                const p1 = face[faceTriangles[i]];
                const p2 = face[faceTriangles[i + 1]];
                const p3 = face[faceTriangles[i + 2]];

                if (p1 && p2 && p3) {
                    const x1 = p1.x * w, y1 = p1.y * h, z1 = p1.z * w;
                    const x2 = p2.x * w, y2 = p2.y * h, z2 = p2.z * w;
                    const x3 = p3.x * w, y3 = p3.y * h, z3 = p3.z * w;

                    // Calculate basic geometric lighting values based on surface angles
                    const v1x = x2 - x1, v1y = y2 - y1, v1z = z2 - z1;
                    const v2x = x3 - x1, v2y = y3 - y1, v2z = z3 - z1;

                    const nx = v1y * v2z - v1z * v2y;
                    const ny = v1z * v2x - v1x * v2z;
                    const nz = v1x * v2y - v1y * v2x;
                    
                    const length = Math.sqrt(nx*nx + ny*ny + nz*nz);
                    let lighting = 0.5; 
                    if (length > 0) {
                        lighting = Math.max(0.1, Math.min(1.0, (nx * 0.3 + ny * -0.4 + nz * 0.9) / length));
                    }

                    // Map the research-style shaded green palette onto the solid polygons
                    const r = Math.floor(20 + lighting * 40);
                    const g = Math.floor(90 + lighting * 110);
                    const b = Math.floor(35 + lighting * 55);
                    
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.75)`;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineTo(x3, y3);
                    ctx.closePath();
                    ctx.fill();

                    // Crisp wire mesh lines drawn cleanly over the shaded polygons
                    ctx.strokeStyle = "rgba(0, 255, 120, 0.35)";
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }

            // High-contrast pink scanner callouts for key facial features
            ctx.strokeStyle = "rgba(255, 51, 102, 0.75)";
            ctx.lineWidth = 1.8;
            const features = [
                [33, 160, 158, 133, 153, 144, 33], 
                [362, 385, 387, 263, 373, 380, 362], 
                [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 375, 321, 405, 314, 17, 84, 181, 91, 146, 61] 
            ];
            features.forEach(path => {
                ctx.beginPath();
                path.forEach((idx, step) => {
                    const pt = face[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });
        }

        // --- ORIGINAL WORKING HAND TRACKER MAP ---
        if (handResult.landmarks && handResult.landmarks.length > 0) {
            handResult.landmarks.forEach(hand => {
                ctx.strokeStyle = "#ffcc00"; 
                ctx.lineWidth = 2.2;
                ctx.beginPath();
                HAND_CONNECTIONS.forEach(([start, end]) => {
                    const p1 = hand[start];
                    const p2 = hand[end];
                    if (p1 && p2) {
                        ctx.moveTo(p1.x * w, p1.y * h);
                        ctx.lineTo(p2.x * w, p2.y * h);
                    }
                });
                ctx.stroke();

                ctx.strokeStyle = "rgba(255, 204, 0, 0.5)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                HAND_EDGES.forEach((idx, step) => {
                    const pt = hand[idx];
                    if (pt) {
                        if (step === 0) ctx.moveTo(pt.x * w, pt.y * h);
                        else ctx.lineTo(pt.x * w, pt.y * h);
                    }
                });
                ctx.stroke();
            });
        }

        ctx.restore();
    }

    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU NATIVE]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }

    requestAnimationFrame(processingRenderLoop);
}

initializeSystem();
</script>
</body>
</html>
