<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Local 3D Matrix Mesh</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #020204; }
        #app { position: relative; width: 100vw; height: 100vh; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        #telemetry {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 12px 16px; background: rgba(5, 5, 10, 0.85);
            border: 1px solid rgba(0, 245, 212, 0.3); border-radius: 8px;
            font-size: 11px; color: #00f5d4; font-family: monospace;
            line-height: 1.6; letter-spacing: 0.5px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

<div id="app">
    <div id="telemetry">
        <div>SYSTEM: LOCAL GEOMETRIC MATRIX</div>
        <div id="fps">FPS: -- [GPU DIRECT]</div>
    </div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const fpsDisplay = document.getElementById("fps");

let frameCount = 0;
let lastFpsUpdate = performance.now();

// Request camera access immediately on page load to prevent mobile Safari device lockouts
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
}).then(stream => {
    video.srcObject = stream;
    video.play();
    initializeTracking();
}).catch(err => {
    console.error("Camera access denied or unavailable:", err);
});

function initializeTracking() {
    // 1. Configure the local face mesh matrix tracker
    const faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });
    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // 2. Configure the local hand skeletal tracker
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    // Handle combined tracking output frames
    faceMesh.onResults((results) => {
        renderMatrixFrame(results, null);
    });
    
    // Direct camera frames straight into the local processing pipelines
    const camera = new Camera(video, {
        onFrame: async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            await faceMesh.send({ image: video });
            await hands.send({ image: video });
        }
    });
    
    // Listen for hand data frames independently to combine with face frames
    hands.onResults((results) => {
        window.latestHandResults = results;
    });

    camera.start();
}

function renderMatrixFrame(faceResults, handResults) {
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    
    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1); // Mirror matching the webcam stream flip

    // --- TRUE GEOMETRIC FACE MESH ---
    if (faceResults.multiFaceLandmarks && faceResults.multiFaceLandmarks.length > 0) {
        const landmarks = faceResults.multiFaceLandmarks[0];

        // Draw the full interconnected 3D mesh grid (Anatomical Tesselation)
        ctx.strokeStyle = "rgba(0, 245, 212, 0.25)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        for (const connection of FACEMESH_TESSELATION) {
            const from = landmarks[connection[0]];
            const to = landmarks[connection[1]];
            if (from && to) {
                ctx.moveTo(from.x * w, from.y * h);
                ctx.lineTo(to.x * w, to.y * h);
            }
        }
        ctx.stroke();

        // Overlay glowing target loops for Eyes, Brows, and Lips
        const highlightFeatures = [
            { path: FACEMESH_RIGHT_EYE, color: "#ff007f", width: 2.0 },
            { path: FACEMESH_LEFT_EYE, color: "#ff007f", width: 2.0 },
            { path: FACEMESH_LIPS, color: "#ff007f", width: 2.0 },
            { path: FACEMESH_RIGHT_EYEBROW, color: "#00f5d4", width: 1.5 },
            { path: FACEMESH_LEFT_EYEBROW, color: "#00f5d4", width: 1.5 }
        ];

        highlightFeatures.forEach(feature => {
            ctx.strokeStyle = feature.color;
            ctx.lineWidth = feature.width;
            ctx.beginPath();
            for (const connection of feature.path) {
                const from = landmarks[connection[0]];
                const to = landmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();
        });

        // Generate matrix micro-nodes on top of all intersections
        ctx.fillStyle = "rgba(0, 245, 212, 0.8)";
        for (const pt of landmarks) {
            ctx.beginPath();
            ctx.arc(pt.x * w, pt.y * h, 1.5, 0, 2 * Math.PI);
            ctx.fill();
        }
    }

    // --- STRUCTURAL HAND RIGS ---
    const activeHands = window.latestHandResults;
    if (activeHands && activeHands.multiHandLandmarks) {
        activeHands.multiHandLandmarks.forEach(handLandmarks => {
            
            // Connect joints along structural skeletal bone lines
            ctx.strokeStyle = "#ffcc00";
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            for (const connection of HAND_CONNECTIONS) {
                const from = handLandmarks[connection[0]];
                const to = handLandmarks[connection[1]];
                if (from && to) {
                    ctx.moveTo(from.x * w, from.y * h);
                    ctx.lineTo(to.x * w, to.y * h);
                }
            }
            ctx.stroke();

            // Render matching golden matrix tracking nodes
            ctx.fillStyle = "#ffcc00";
            for (const pt of handLandmarks) {
                ctx.beginPath();
                ctx.arc(pt.x * w, pt.y * h, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
        });
    }

    ctx.restore();

    // Live FPS Tracking Engine
    frameCount++;
    const now = performance.now();
    if (now >= lastFpsUpdate + 1000) {
        const currentFps = Math.round((frameCount * 1000) / (now - lastFpsUpdate));
        fpsDisplay.textContent = `FPS: ${currentFps} [GPU DIRECT]`;
        frameCount = 0;
        lastFpsUpdate = now;
    }
}
</script>
</body>
</html>
